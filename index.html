<!DOCTYPE html>
<html>
<head>
    <title>Feel Better App</title>

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            font-family: Arial;
            padding-top: 80px;
            color: white;
        }

        h1 {
            font-size: 35px;
        }

        button {
            margin: 10px;
            padding: 12px 20px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        input {
            padding:10px;
            border-radius:10px;
            border:none;
            width:80%;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
        }

        #history {
            margin-top:20px;
        }
    </style>
</head>

<body>

   <h2>Mind Relief 💜</h2>
    <h1>How are you feeling today? 💭</h1>

    <button onclick="happy()">😊 Happy</button>
    <button onclick="sad()">😔 Sad</button>
    <button onclick="angry()">😡 Angry</button>

    <div id="result"></div>

    <br><br>

    <input id="note" placeholder="Write your feeling">

    <br><br>

    <button onclick="saveNote()">Save Feeling 💾</button>
 
    <p id="response" style="margin-top:15px;"></p> 
 
    <button onclick="clearAll()">🗑️ Delete All</button>
 
    <button onclick="startVoice()">🎤 Speak</button> 

   <h3>Your Journal 📝</h3> 
    <div id="history"></div>

    <script>
      function startVoice() {
  if (!('webkitSpeechRecognition' in window)) {
    alert("Voice not supported in this device");
    return;
  }

  let recognition = new webkitSpeechRecognition();
  recognition.lang = "en-US";
  recognition.start();

  recognition.onresult = function(event) {
    let text = event.results[0][0].transcript;
    document.getElementById("note").value = text;
  };
}
      function clearAll() {
  localStorage.removeItem("feelings");
  document.getElementById("history").innerHTML = "";
}
        function happy() {
            document.getElementById("result").innerText = "Keep spreading your positivity 💛";
        }

        function sad() {
            document.getElementById("result").innerText = "It's okay to feel sad 🤍";
        }

        function angry() {
            document.getElementById("result").innerText = "Take a deep breath 🧘‍♀️";
        }

        function saveNote() {
            let text = document.getElementById("note").value;
            let message = "";

if(text.includes("happy")) {
  message = "Keep shining 💛";
} else if(text.includes("sad")) {
  message = "You are not alone 🤍";
} else if(text.includes("angry")) {
  message = "Take a deep breath 🧘‍♀️";
} else {
  message = "Your feelings matter 💜";
}

alert(message);

document.getElementById("response").innerText = message;

            if(text === "") {
                alert("Write something first");
                return;
            }

            let old = JSON.parse(localStorage.getItem("feelings")) || [];
            old.push(text);
            localStorage.setItem("feelings", JSON.stringify(old));

            alert("Saved 💜");

            document.getElementById("note").value = "";

            showHistory();
        }

        function showHistory() {
            let data = JSON.parse(localStorage.getItem("feelings")) || [];

            let output = "";
            data.forEach((item) => {
                output += "<p>📝 " + item + "</p>";
            });

            document.getElementById("history").innerHTML = output;
        }

        window.onload = showHistory;
    </script>

</body>
</html>
